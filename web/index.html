<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>mini-claude-code</title>
  <style>
    :root { font-family: system-ui, sans-serif; background: #0f1419; color: #e6edf3; }
    body { max-width: 52rem; margin: 0 auto; padding: 1.25rem; }
    h1 { font-size: 1.15rem; font-weight: 600; }
    label { display: block; font-size: 0.8rem; color: #8b949e; margin-top: 0.75rem; }
    input, textarea, button {
      width: 100%; box-sizing: border-box; margin-top: 0.25rem;
      background: #161b22; border: 1px solid #30363d; color: #e6edf3;
      border-radius: 6px; padding: 0.5rem 0.6rem; font-size: 0.9rem;
    }
    button { width: auto; cursor: pointer; margin-top: 0.75rem; background: #238636; border-color: #238636; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #log { margin-top: 1rem; font-size: 0.85rem; line-height: 1.45; white-space: pre-wrap; background: #161b22; border: 1px solid #30363d; border-radius: 6px; padding: 0.75rem; min-height: 8rem; max-height: 24rem; overflow-y: auto; }
    .tool { color: #d29922; }
    .err { color: #f85149; }
    .assistant { color: #79c0ff; }
    .meta { font-size: 0.75rem; color: #8b949e; }
  </style>
</head>
<body>
  <h1>mini-claude-code (web)</h1>
  <p class="meta">Point this UI at your Fly API. Keys stay on the server only.</p>

  <label>API base URL (no trailing slash)</label>
  <input id="apiBase" type="url" placeholder="https://your-app.fly.dev" autocomplete="off" />

  <label>Optional: CHAT_API_SECRET (Bearer token)</label>
  <input id="apiSecret" type="password" placeholder="leave empty if server has no secret" autocomplete="off" />

  <label>Your message</label>
  <textarea id="msg" rows="3" placeholder="Ask something…"></textarea>

  <button id="send" type="button">Send (SSE stream)</button>
  <button id="ping" type="button" style="margin-left:0.5rem;background:#21262d;border-color:#30363d">GET /health</button>

  <div id="log" aria-live="polite"></div>

  <script>
    const LS_BASE = 'mini_claude_api_base';
    const LS_SECRET = 'mini_claude_api_secret';

    const apiBase = document.getElementById('apiBase');
    const apiSecret = document.getElementById('apiSecret');
    const msg = document.getElementById('msg');
    const log = document.getElementById('log');
    const sendBtn = document.getElementById('send');
    const pingBtn = document.getElementById('ping');

    apiBase.value = localStorage.getItem(LS_BASE) || '';
    apiSecret.value = localStorage.getItem(LS_SECRET) || '';

    function append(line, cls) {
      const span = document.createElement('div');
      if (cls) span.className = cls;
      span.textContent = line;
      log.appendChild(span);
      log.scrollTop = log.scrollHeight;
    }

    function authHeaders() {
      const h = { 'Content-Type': 'application/json' };
      const t = apiSecret.value.trim();
      if (t) h['Authorization'] = 'Bearer ' + t;
      return h;
    }

    let messages = [];

    pingBtn.addEventListener('click', async () => {
      const base = apiBase.value.trim().replace(/\/$/, '');
      if (!base) { append('Set API base URL first.', 'err'); return; }
      localStorage.setItem(LS_BASE, base);
      localStorage.setItem(LS_SECRET, apiSecret.value);
      log.textContent = '';
      try {
        const r = await fetch(base + '/health');
        append(await r.text());
      } catch (e) {
        append(String(e), 'err');
      }
    });

    sendBtn.addEventListener('click', async () => {
      const base = apiBase.value.trim().replace(/\/$/, '');
      const text = msg.value.trim();
      if (!base || !text) return;
      localStorage.setItem(LS_BASE, base);
      localStorage.setItem(LS_SECRET, apiSecret.value);

      messages.push({ role: 'user', content: text });
      msg.value = '';
      log.textContent = '';
      sendBtn.disabled = true;

      try {
        const res = await fetch(base + '/chat/stream', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({ messages: structuredClone(messages), system: null }),
        });
        if (!res.ok) {
          append('HTTP ' + res.status + ': ' + (await res.text()), 'err');
          messages.pop();
          sendBtn.disabled = false;
          return;
        }
        const reader = res.body.getReader();
        const dec = new TextDecoder();
        let buf = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });
          let sep;
          while ((sep = buf.indexOf('\n\n')) >= 0) {
            const block = buf.slice(0, sep);
            buf = buf.slice(sep + 2);
            for (const line of block.split('\n')) {
              if (!line.startsWith('data: ')) continue;
              let data;
              try { data = JSON.parse(line.slice(6)); } catch { continue; }
              if (data.type === 'tool') {
                append('[tool] ' + data.name + ' ' + JSON.stringify(data.input), 'tool');
                if (data.result_preview) append(data.result_preview, 'meta');
              } else if (data.type === 'assistant') {
                append(data.content || '', 'assistant');
              } else if (data.type === 'error') {
                append('Error: ' + data.message, 'err');
              } else if (data.type === 'done') {
                append('— done —', 'meta');
                if (Array.isArray(data.messages)) messages = data.messages;
              }
            }
          }
        }
      } catch (e) {
        append(String(e), 'err');
        messages.pop();
      }
      sendBtn.disabled = false;
    });
  </script>
</body>
</html>
